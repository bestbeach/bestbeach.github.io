<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css"><link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet-measure.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet-measure.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[44.715707812125196,13.522892110804584],[44.99057581660039,14.240982624096748]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
        .innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
        .className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
            map.setMaxBounds(map.getBounds());
        }
        map.createPane('pane_ESRIPodloga_0');
        map.getPane('pane_ESRIPodloga_0').style.zIndex = 400;
        var layer_ESRIPodloga_0 = L.tileLayer('http://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_ESRIPodloga_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_ESRIPodloga_0;
        map.addLayer(layer_ESRIPodloga_0);
        map.createPane('pane_Morskavegetacija_1');
        map.getPane('pane_Morskavegetacija_1').style.zIndex = 401;
        var img_Morskavegetacija_1 = 'data/Morskavegetacija_1.png';
        var img_bounds_Morskavegetacija_1 = [[44.71855200000065,13.66137339560443],[44.980347902439675,14.088517219780256]];
        var layer_Morskavegetacija_1 = new L.imageOverlay(img_Morskavegetacija_1,
                                              img_bounds_Morskavegetacija_1,
                                              {pane: 'pane_Morskavegetacija_1'});
        bounds_group.addLayer(layer_Morskavegetacija_1);
        map.addLayer(layer_Morskavegetacija_1);
        map.createPane('pane_Zagaenje_2');
        map.getPane('pane_Zagaenje_2').style.zIndex = 402;
        var img_Zagaenje_2 = 'data/Zagaenje_2.png';
        var img_bounds_Zagaenje_2 = [[44.71855200000065,13.66137339560443],[44.980347902439675,14.088517219780256]];
        var layer_Zagaenje_2 = new L.imageOverlay(img_Zagaenje_2,
                                              img_bounds_Zagaenje_2,
                                              {pane: 'pane_Zagaenje_2'});
        bounds_group.addLayer(layer_Zagaenje_2);
        map.addLayer(layer_Zagaenje_2);
        map.createPane('pane_Koliinacijanobakterija_3');
        map.getPane('pane_Koliinacijanobakterija_3').style.zIndex = 403;
        var img_Koliinacijanobakterija_3 = 'data/Koliinacijanobakterija_3.png';
        var img_bounds_Koliinacijanobakterija_3 = [[44.71855200000065,13.66137339560443],[44.980347902439675,14.088517219780256]];
        var layer_Koliinacijanobakterija_3 = new L.imageOverlay(img_Koliinacijanobakterija_3,
                                              img_bounds_Koliinacijanobakterija_3,
                                              {pane: 'pane_Koliinacijanobakterija_3'});
        bounds_group.addLayer(layer_Koliinacijanobakterija_3);
        map.addLayer(layer_Koliinacijanobakterija_3);
        map.createPane('pane_GoogleLabels_4');
        map.getPane('pane_GoogleLabels_4').style.zIndex = 404;
        var layer_GoogleLabels_4 = L.tileLayer('https://mt1.google.com/vt/lyrs=h&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleLabels_4',
            opacity: 1.0,
            attribution: '<a href="https://www.google.at/permissions/geoguidelines/attr-guide.html">Map data ©2015 Google</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_GoogleLabels_4;
        map.addLayer(layer_GoogleLabels_4);
        var baseMaps = {};
        L.control.layers(baseMaps,{"Google Labels": layer_GoogleLabels_4,"Količina cijanobakterija": layer_Koliinacijanobakterija_3,"Zagađenje": layer_Zagaenje_2,"Morska vegetacija": layer_Morskavegetacija_1,"ESRI Podloga": layer_ESRIPodloga_0,}).addTo(map);
        setBounds();
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        </script>
    </body>
</html>
